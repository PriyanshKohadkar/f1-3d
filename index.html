<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>F1 Viewer</title>
<style>
  body { margin:0; background:#05050a; overflow:hidden; font-family:monospace; }
  canvas { display:block; }
  #ui { position:fixed; top:0; left:0; right:0; bottom:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; color:#fff; z-index:10; background:#05050a; transition:opacity .5s; }
  #bar-wrap { width:300px; height:3px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
  #bar { height:100%; background:#e8002d; width:0%; transition:width .2s; }
  #msg { font-size:12px; color:rgba(255,255,255,0.4); letter-spacing:2px; }
  #title { font-size:32px; font-weight:700; letter-spacing:6px; }
  #title span { color:#e8002d; }
  #controls { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:20; }
  button { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); padding:7px 16px; border-radius:6px; cursor:pointer; font-family:monospace; font-size:11px; letter-spacing:1px; transition:all .2s; }
  button:hover { background:rgba(232,0,45,0.2); border-color:#e8002d; color:#fff; }
  button.on { background:rgba(232,0,45,0.25); border-color:#e8002d; color:#e8002d; }
  #hint { position:fixed; top:14px; right:16px; font-size:10px; color:rgba(255,255,255,0.2); letter-spacing:1px; line-height:2; text-align:right; }
  #brand { position:fixed; top:14px; left:16px; font-size:20px; font-weight:700; letter-spacing:4px; color:#fff; }
  #brand span { color:#e8002d; }
</style>
</head>
<body>

<div id="ui">
  <div id="title">F<span>1</span></div>
  <div id="msg">LOADING MODEL…</div>
  <div id="bar-wrap"><div id="bar"></div></div>
</div>

<div id="brand">F<span>1</span></div>
<div id="hint">drag · rotate<br>scroll · zoom<br>right-drag · pan</div>

<div id="controls" style="display:none">
  <button id="btn-rot" onclick="toggleRot()">⟳ AUTO ROTATE</button>
  <button onclick="setView('front')">FRONT</button>
  <button onclick="setView('side')">SIDE</button>
  <button onclick="setView('top')">TOP</button>
  <button id="btn-wire" onclick="toggleWire()">WIREFRAME</button>
  <button onclick="setView('reset')">RESET</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="main.js"> </script>
</body>
</html>
