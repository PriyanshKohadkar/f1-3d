<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Car Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e8002d;
    --gold: #c8a400;
    --dim: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.12);
  }

  body {
    background: #05050a;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    cursor: grab;
  }
  #canvas-container:active { cursor: grabbing; }

  canvas { display: block; width: 100% !important; height: 100% !important; }

  /* Top bar */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: linear-gradient(to bottom, rgba(5,5,10,0.95), transparent);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    z-index: 10;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #fff;
  }
  .logo span { color: var(--red); }

  .divider {
    width: 1px; height: 24px;
    background: var(--border);
  }

  .model-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #status {
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
  }

  /* Loading overlay */
  #loader {
    position: fixed;
    inset: 0;
    background: #05050a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 28px;
    transition: opacity .6s ease;
  }

  .loader-title {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #fff;
  }
  .loader-title span { color: var(--red); }

  .loader-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.3);
  }

  .progress-wrap {
    width: 280px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--red);
    width: 0%;
    transition: width .2s ease;
    border-radius: 2px;
  }

  .progress-pct {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--red);
    letter-spacing: 2px;
  }

  /* Side controls */
  #controls {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }

  .ctrl-btn {
    width: 44px; height: 44px;
    background: var(--dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: rgba(255,255,255,0.7);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s, border-color .2s, color .2s;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500;
  }
  .ctrl-btn:hover { background: rgba(232,0,45,0.2); border-color: var(--red); color: #fff; }
  .ctrl-btn.active { background: rgba(232,0,45,0.3); border-color: var(--red); color: var(--red); }

  .ctrl-sep {
    width: 44px; height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* Bottom info bar */
  #infobar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: linear-gradient(to top, rgba(5,5,10,0.95), transparent);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 28px;
    z-index: 10;
  }

  .info-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .info-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
  }

  .info-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
  }

  /* Lighting presets */
  #lighting-panel {
    position: fixed;
    left: 20px;
    bottom: 68px;
    background: rgba(5,5,10,0.92);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    z-index: 10;
    width: 200px;
  }

  .panel-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .preset-btn {
    display: block;
    width: 100%;
    padding: 8px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: rgba(255,255,255,0.6);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    text-align: left;
    margin-bottom: 6px;
    transition: all .2s;
  }
  .preset-btn:hover, .preset-btn.active {
    background: rgba(232,0,45,0.15);
    border-color: var(--red);
    color: #fff;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .slider-row label {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    width: 50px;
    text-transform: uppercase;
  }
  .slider-row input[type=range] {
    flex: 1;
    accent-color: var(--red);
    height: 2px;
  }

  /* Help hint */
  #hint {
    position: fixed;
    bottom: 58px;
    right: 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
    line-height: 1.9;
    text-align: right;
  }

  /* Error */
  #error-msg {
    display: none;
    position: fixed;
    inset: 0;
    background: #05050a;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 200;
  }
  #error-msg p { color: rgba(255,255,255,0.5); font-size: 14px; letter-spacing: 1px; }
  #error-msg .err-title { color: var(--red); font-size: 24px; font-weight: 700; letter-spacing: 4px; }
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="loader-title">F<span>1</span></div>
  <div class="loader-sub">LOADING MODEL</div>
  <div class="progress-wrap"><div class="progress-bar" id="pbar"></div></div>
  <div class="progress-pct" id="ppct">0%</div>
</div>

<!-- Error -->
<div id="error-msg">
  <div class="err-title">MODEL ERROR</div>
  <p id="err-text">Could not load GLB file.</p>
  <p style="color:rgba(255,255,255,0.3);font-size:12px;">Make sure the .glb file is in the same folder as this HTML file.</p>
</div>

<!-- Canvas -->
<div id="canvas-container"></div>

<!-- Top bar -->
<div id="topbar">
  <div class="logo">F<span>1</span></div>
  <div class="divider"></div>
  <div class="model-name">APX GP · APX01 · 2025</div>
  <div id="status">READY</div>
</div>

<!-- Side controls -->
<div id="controls">
  <button class="ctrl-btn" id="btn-auto" title="Auto rotate" onclick="toggleAutoRotate()">⟳</button>
  <button class="ctrl-btn" id="btn-wire" title="Wireframe" onclick="toggleWireframe()">⬡</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn" title="Front view" onclick="setView('front')">F</button>
  <button class="ctrl-btn" title="Side view" onclick="setView('side')">S</button>
  <button class="ctrl-btn" title="Top view" onclick="setView('top')">T</button>
  <button class="ctrl-btn" title="Reset view" onclick="setView('reset')">◎</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn" title="Zoom in" onclick="zoomStep(-1)">+</button>
  <button class="ctrl-btn" title="Zoom out" onclick="zoomStep(1)">−</button>
</div>

<!-- Lighting panel -->
<div id="lighting-panel">
  <div class="panel-title">LIGHTING</div>
  <button class="preset-btn active" onclick="setPreset('studio')">Studio</button>
  <button class="preset-btn" onclick="setPreset('pits')">Pit Lane</button>
  <button class="preset-btn" onclick="setPreset('track')">Race Day</button>
  <button class="preset-btn" onclick="setPreset('night')">Night Race</button>
  <div class="slider-row">
    <label>EXPO</label>
    <input type="range" min="0.4" max="2.5" step="0.05" value="1.3" id="exp-slider" oninput="setExposure(this.value)">
  </div>
  <div class="slider-row">
    <label>ENV</label>
    <input type="range" min="0" max="2" step="0.05" value="0.6" id="env-slider" oninput="setEnvIntensity(this.value)">
  </div>
</div>

<!-- Bottom info -->
<div id="infobar">
  <div class="info-item">
    <span class="info-label">DRAG</span>
    <span class="info-value">rotate</span>
  </div>
  <div class="info-item">
    <span class="info-label">SCROLL</span>
    <span class="info-value">zoom</span>
  </div>
  <div class="info-item">
    <span class="info-label">RIGHT DRAG</span>
    <span class="info-value">pan</span>
  </div>
  <div style="margin-left:auto;" class="info-item">
    <span class="info-label">VERTS</span>
    <span class="info-value" id="info-verts">—</span>
  </div>
  <div class="info-item">
    <span class="info-label">TRIS</span>
    <span class="info-value" id="info-tris">—</span>
  </div>
</div>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>

<script>
// ---- SCENE SETUP ----
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05050a);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(5, 2, 5);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 0.5;
controls.maxDistance = 30;
controls.autoRotate = false;
controls.autoRotateSpeed = 1.2;

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---- LIGHTING ----
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xfff5e8, 2.5);
keyLight.position.set(6, 8, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 50;
keyLight.shadow.camera.left = -8;
keyLight.shadow.camera.right = 8;
keyLight.shadow.camera.top = 8;
keyLight.shadow.camera.bottom = -8;
keyLight.shadow.bias = -0.001;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xb0c8ff, 0.8);
fillLight.position.set(-5, 3, -3);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 0.6);
rimLight.position.set(0, 5, -8);
scene.add(rimLight);

const groundLight = new THREE.HemisphereLight(0x334466, 0x110f08, 0.5);
scene.add(groundLight);

// Ground plane with reflection feel
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x08080e,
  metalness: 0.05,
  roughness: 0.95,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Subtle grid
const grid = new THREE.GridHelper(30, 60, 0x111118, 0x0e0e14);
grid.position.y = 0.001;
scene.add(grid);

// ---- ENVIRONMENT MAP (procedural) ----
const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();

function buildEnvMap(skyColor, groundColor) {
  const envScene = new THREE.Scene();
  envScene.background = new THREE.Color(skyColor);
  const envLight = new THREE.HemisphereLight(skyColor, groundColor, 1);
  envScene.add(envLight);
  return pmremGenerator.fromScene(new THREE.RoomEnvironment()).texture;
}
scene.environment = pmremGenerator.fromScene(new THREE.RoomEnvironment()).texture;
scene.environmentIntensity = 0.6;

// ---- LOAD MODEL ----
let loadedModel = null;
let allMeshes = [];

const loader = new THREE.GLTFLoader();
loader.load(
  '/blob/main/f1_2025_apx_gp_apx01__1_.glb',

  // onLoad
  function(gltf) {
    const model = gltf.scene;
    loadedModel = model;

    // Center & scale
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 4.5 / maxDim;

    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));

    // Sit on ground
    const box2 = new THREE.Box3().setFromObject(model);
    model.position.y -= box2.min.y;

    model.traverse(node => {
      if (node.isMesh) {
        node.castShadow = true;
        node.receiveShadow = true;
        allMeshes.push(node);

        // Enhance materials
        if (node.material) {
          const mats = Array.isArray(node.material) ? node.material : [node.material];
          mats.forEach(mat => {
            if (mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial) {
              mat.envMapIntensity = 0.6;
            }
          });
        }
      }
    });

    scene.add(model);

    // Camera frame it nicely
    const box3 = new THREE.Box3().setFromObject(model);
    const sz = box3.getSize(new THREE.Vector3());
    const longest = Math.max(sz.x, sz.y, sz.z);
    camera.position.set(longest * 1.1, longest * 0.5, longest * 1.1);
    controls.target.set(0, sz.y * 0.35, 0);
    controls.update();

    // Count geometry
    let verts = 0, tris = 0;
    allMeshes.forEach(m => {
      if (m.geometry) {
        verts += m.geometry.attributes.position?.count || 0;
        tris += (m.geometry.index ? m.geometry.index.count / 3 : m.geometry.attributes.position?.count / 3) || 0;
      }
    });
    document.getElementById('info-verts').textContent = (verts / 1000).toFixed(1) + 'K';
    document.getElementById('info-tris').textContent = Math.round(tris / 1000) + 'K';
    document.getElementById('status').textContent = 'LOADED';

    // Fade out loader
    const loaderEl = document.getElementById('loader');
    loaderEl.style.opacity = '0';
    setTimeout(() => loaderEl.style.display = 'none', 700);
  },

  // onProgress
  function(xhr) {
    if (xhr.lengthComputable) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      document.getElementById('pbar').style.width = pct + '%';
      document.getElementById('ppct').textContent = pct + '%';
    }
  },

  // onError
  function(err) {
    console.error(err);
    document.getElementById('loader').style.display = 'none';
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'flex';
    document.getElementById('err-text').textContent = 'Could not load: f1_2025_apx_gp_apx01__1_.glb';
  }
);

// ---- CONTROLS ----
let wireframe = false;
let autoRotating = false;

window.toggleAutoRotate = function() {
  autoRotating = !autoRotating;
  controls.autoRotate = autoRotating;
  document.getElementById('btn-auto').classList.toggle('active', autoRotating);
};

window.toggleWireframe = function() {
  wireframe = !wireframe;
  allMeshes.forEach(m => {
    const mats = Array.isArray(m.material) ? m.material : [m.material];
    mats.forEach(mat => mat.wireframe = wireframe);
  });
  document.getElementById('btn-wire').classList.toggle('active', wireframe);
};

window.setView = function(v) {
  if (!loadedModel) return;
  const box = new THREE.Box3().setFromObject(loadedModel);
  const sz = box.getSize(new THREE.Vector3());
  const longest = Math.max(sz.x, sz.y, sz.z);
  const center = box.getCenter(new THREE.Vector3());

  const views = {
    front:  [0, sz.y * 0.35, longest * 1.6],
    side:   [longest * 1.8, sz.y * 0.35, 0],
    top:    [0, longest * 2.0, 0.01],
    reset:  [longest * 1.1, longest * 0.5, longest * 1.1],
  };
  const pos = views[v];
  camera.position.set(pos[0], pos[1], pos[2]);
  controls.target.copy(center).setY(sz.y * 0.35);
  controls.update();
};

window.zoomStep = function(dir) {
  const factor = dir > 0 ? 1.25 : 0.8;
  camera.position.multiplyScalar(factor);
  controls.update();
};

// ---- LIGHTING PRESETS ----
const presets = {
  studio: {
    sky: 0x05050a, ambient: 0.4, key: [0xfff5e8, 2.5, 6, 8, 4],
    fill: [0xb0c8ff, 0.8], rim: [0xffffff, 0.6], expo: 1.3, env: 0.6
  },
  pits: {
    sky: 0x06060e, ambient: 0.3, key: [0xfff0d0, 3.0, 2, 6, 2],
    fill: [0x8899bb, 0.5], rim: [0xffcc88, 0.8], expo: 1.5, env: 0.4
  },
  track: {
    sky: 0x0a0a12, ambient: 0.5, key: [0xfffae0, 3.5, 8, 10, 3],
    fill: [0x88aaff, 1.0], rim: [0xffffff, 0.4], expo: 1.2, env: 0.8
  },
  night: {
    sky: 0x020205, ambient: 0.15, key: [0xffffff, 4.0, 0, 8, 0],
    fill: [0x2244aa, 0.4], rim: [0xff4400, 0.6], expo: 1.8, env: 0.2
  }
};

window.setPreset = function(name) {
  const p = presets[name];
  scene.background.set(p.sky);
  ambient.intensity = p.ambient;
  keyLight.color.setHex(p.key[0]);
  keyLight.intensity = p.key[1];
  keyLight.position.set(p.key[2], p.key[3], p.key[4]);
  fillLight.color.setHex(p.fill[0]);
  fillLight.intensity = p.fill[1];
  rimLight.color.setHex(p.rim[0]);
  rimLight.intensity = p.rim[1];
  renderer.toneMappingExposure = p.expo;
  scene.environmentIntensity = p.env;
  document.getElementById('exp-slider').value = p.expo;
  document.getElementById('env-slider').value = p.env;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
};

window.setExposure = function(v) {
  renderer.toneMappingExposure = parseFloat(v);
};

window.setEnvIntensity = function(v) {
  scene.environmentIntensity = parseFloat(v);
  allMeshes.forEach(m => {
    const mats = Array.isArray(m.material) ? m.material : [m.material];
    mats.forEach(mat => { if (mat.envMapIntensity !== undefined) mat.envMapIntensity = parseFloat(v); });
  });
};

// ---- RENDER LOOP ----
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
